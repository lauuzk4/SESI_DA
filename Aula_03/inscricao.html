<html>
       <meta charset="UTF-8">
    <title>Inscrições     </title> 
    <body>
      <form>

<fieldset>
<legend>Dados Pessoais</legend>

<label>Nome:</label>
<input type="text" required>

<label>Sobrenome:</label>
<input type="text" required>

<label>CPF:</label>
<input type="text" required>

<label>RG:</label>
<input type="text" required>

<label>Data de nascimento:</label>
<input type="date">

<label>E-mail:</label>
<input type="email">

<label>Telefone:</label>
<input type="tel">

</fieldset>

<fieldset>

<legend>Dados Profissionais</legend>

<label>Empresa:</label>
<input type="text">

<label>Cargo:</label>
<input type="text">

<label>Área:</label>

<select>

<option>Desenvolvimento</option>
<option>Redes</option>
<option>IA</option>
<option>Robótica</option>

</select>

</fieldset>

<fieldset>

<legend>Participação</legend>

<p>Dias do evento:</p>

<input type="checkbox"> Dia 15
<input type="checkbox"> Dia 16
<input type="checkbox"> Dia 17

<p>Trilhas de interesse:</p>

<input type="checkbox"> IA
<input type="checkbox"> Segurança
<input type="checkbox"> Robótica

<p>Alimentação especial:</p>

<input type="radio" name="alimentacao"> Sim
<input type="radio" name="alimentacao"> Não

<textarea rows="5" cols="40"></textarea>

</fieldset>

<button type="submit">
Enviar Inscrição
</button>

</form>

    </body>
 
</html>
